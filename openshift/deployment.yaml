# Runs the app image from the ImageStream (tag latest). The image trigger keeps the
# Deployment aligned with ImageStreamTag speech-recorder:latest after Tekton pushes.
# Apply in the same namespace as the ImageStream and Pipeline.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: speech-recorder
  labels:
    app: speech-recorder
  annotations:
    image.openshift.io/triggers: |-
      [
        {
          "from": {
            "kind": "ImageStreamTag",
            "name": "speech-recorder:latest"
          },
          "fieldPath": "spec.template.spec.containers[?(@.name==\"speech-recorder\")].image",
          "paused": false
        }
      ]
spec:
  replicas: 1
  selector:
    matchLabels:
      app: speech-recorder
  template:
    metadata:
      labels:
        app: speech-recorder
    spec:
      containers:
        - name: speech-recorder
          image: speech-recorder:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: VLLM_BASE_URL
              value: http://redhataigemma-3n-e4b-it-fp8-dynamic-predictor:8080
            # Set to "true" when VLLM_BASE_URL is https:// and the cert is self-signed / private CA.
            - name: VLLM_TLS_INSECURE
              value: "true"
            # Optional: set to the exact model id served by vLLM (otherwise first entry from GET /v1/models is used).
            # - name: VLLM_MODEL
            #   value: google/gemma-3n-E4B-it
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
