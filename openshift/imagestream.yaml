# ImageStream for the speech-recorder container image.
# After a successful push from Tekton to
# image-registry.openshift-image-registry.svc:5000/<namespace>/speech-recorder:<tag>,
# OpenShift will record tags here (local lookup policy optional).
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: speech-recorder
  labels:
    app: speech-recorder
spec:
  lookupPolicy:
    local: true
