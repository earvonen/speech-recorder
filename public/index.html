<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Speech Recorder</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="app">
      <h1>Speech Recorder</h1>
      <p class="hint">Press record to capture audio from your microphone. Press again to stop.</p>

      <div class="controls">
        <button type="button" id="recordBtn" class="btn btn-record" aria-pressed="false">
          <span class="btn-record__dot" aria-hidden="true"></span>
          <span id="recordLabel">Record</span>
        </button>
      </div>

      <p id="status" class="status" role="status"></p>

      <div id="actionPanel" class="action-panel hidden" hidden>
        <p class="action-panel__title">Recording ready</p>
        <div class="action-panel__buttons">
          <button type="button" id="sendBtn" class="btn btn-primary">Send</button>
          <button type="button" id="discardBtn" class="btn btn-secondary">Discard</button>
        </div>
      </div>

      <section class="transcribe-panel" aria-labelledby="transcribeHeading">
        <h2 id="transcribeHeading" class="transcribe-panel__title">Transcribe a file already in uploads</h2>
        <p class="transcribe-panel__hint">Enter the audio filename (e.g. <code>recording-123.webm</code>). A <code>.txt</code> transcript is written next to it.</p>
        <div class="transcribe-panel__row">
          <label class="visually-hidden" for="transcribeFilename">Uploads filename</label>
          <input
            type="text"
            id="transcribeFilename"
            class="transcribe-panel__input"
            placeholder="filename.webm"
            autocomplete="off"
            spellcheck="false"
          />
          <button type="button" id="transcribeBtn" class="btn btn-transcribe">Transcribe</button>
        </div>
        <p id="transcribeStatus" class="transcribe-panel__status" role="status"></p>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
